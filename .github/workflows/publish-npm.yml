name: Publish @elixpo/lixsketch to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/lixsketch/**'

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check version is not already published
        working-directory: packages/lixsketch
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view @elixpo/lixsketch version 2>/dev/null || echo "0.0.0")
          echo "Local version: $LOCAL"
          echo "Published version: $REMOTE"
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "Version $LOCAL already published. Bump the version first."
            exit 1
          fi

      - name: Publish to NPM
        run: npm publish --access public --registry https://registry.npmjs.org/ --//registry.npmjs.org/:_authToken=${{ secrets.NPM_LIXSKETCH_PUBLISH_TOKEN }}
        working-directory: packages/lixsketch

      # ── Mirror the same version to GitHub Packages ────────────────────────
      # GitHub Packages requires the package.json `repository.url` to match
      # the repo running this workflow, so we rewrite it just-in-time and
      # restore the original value after publish.
      - name: Reconfigure Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'
          scope: '@elixpo'

      - name: Publish to GitHub Packages
        working-directory: packages/lixsketch
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORIGINAL_REPO=$(node -p "JSON.stringify(require('./package.json').repository || null)")
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.repository = { type: 'git', url: 'git+https://github.com/${{ github.repository }}.git' };
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public --registry https://npm.pkg.github.com
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            const orig = $ORIGINAL_REPO;
            if (orig) pkg.repository = orig; else delete pkg.repository;
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

